name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: macos-arm64,  os: macos-14 }
          - { name: macos-x86_64, os: macos-13 }
          - { name: linux-arm64,  os: ubuntu-24.04-arm }
          - { name: linux-x86_64, os: ubuntu-24.04 }
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: install libmpv (macOS)
        if: runner.os == 'macOS'
        run: brew install mpv

      - name: install libmpv (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libmpv-dev

      - name: build (macOS)
        if: runner.os == 'macOS'
        run: |
          zig build test -Dmpv-prefix="$(brew --prefix)"
          zig build -Doptimize=ReleaseSafe -Dmpv-prefix="$(brew --prefix)"

      - name: build (Linux)
        if: runner.os == 'Linux'
        run: |
          zig build test -Dmpv-prefix=
          zig build -Doptimize=ReleaseSafe -Dmpv-prefix=

      - name: package
        run: tar -czf "ytcli-${{ matrix.name }}.tar.gz" -C zig-out/bin ytcli

      - uses: softprops/action-gh-release@v2
        with:
          files: ytcli-${{ matrix.name }}.tar.gz

  build-freebsd:
    name: freebsd-x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/freebsd-vm@v1
        env:
          ZIG: "0.16.0"
        with:
          usesh: true
          envs: "ZIG"
          prepare: |
            set -e
            pkg install -y mpv pkgconf curl
            fetch -o /tmp/zig.tar.xz "https://ziglang.org/download/${ZIG}/zig-x86_64-freebsd-${ZIG}.tar.xz"
            mkdir -p /opt/zig
            tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
            ln -sf /opt/zig/zig /usr/local/bin/zig
          run: |
            set -e
            zig version
            zig build test -Dmpv-prefix=/usr/local
            zig build -Doptimize=ReleaseSafe -Dmpv-prefix=/usr/local

      - name: package
        run: tar -czf ytcli-freebsd-x86_64.tar.gz -C zig-out/bin ytcli

      - uses: softprops/action-gh-release@v2
        with:
          files: ytcli-freebsd-x86_64.tar.gz
